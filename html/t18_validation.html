<!DOCTYPE html>
<html lang="en">

<head>
  <title>T18-validation</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<!--*************************************************************
  BODY
**************************************************************-->

<body>
  <h1>T18 - Validation</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <form onsubmit="return false;">
    <label for="formName">Name:</label>
    <input type="text" name="formName" id="nameField">
  </form>

  <form onsubmit="return false;">
    <label for="formAge">Age:</label>
    <input type="number" name="formAge" id="ageField" min="1" max="120">
  </form>

  <form onsubmit="return false;">
    <label for="formPocketMoney">Pocket Money:</label>
    <input type="text" name="formPocketMoney" id="pocketMoneyField">
    <br>
  </form>

  <form onsubmit="return false;">
    <label for="formLikesChocolate">On a scale of 1-4, how much do you like chocolate?</label>
    <br>
    <input type="text" name="formLikesChocolate" id="likesChocolateField">
    <br>
    <input type="submit" onclick=getFormInput()>
  </form>

  <div id="spaceForJavaScriptOutput">
    
  </div>
  <br>
  <form onsubmit="return false;">
    <label for="formShoppingList">Shopping lsit</label>
    <br>
    <input type="text" name="formShoppingList" id="shoppingListField">
    <br>
    <input type="submit" value="add" onclick=getShoppingListInput()>
  </form>

  <div id="shoppingListOutput">

  </div>

  <br>
  <form onsubmit="return false;">
    <label for="formVerses">How many verses:</label>
    <br>
    <input type="text" name="formVerses" id="versesField">
    <br>
    <input type="submit" onclick=getVersesInput()>
  </form>

  <div id="milkVerses">
    
  </div>
  
  <script src="/t18_validation.js"></script>

</body>

</html>
<!--*************************************************************
  END OF T10_INPUT_FROM_HTML.HTML
**************************************************************-->
